<style>
  :root{
    --void:#060907;
    --panel:#0c120d;
    --panel-hi:#101a12;
    --grid:#1b2e1d;
    --green:#39ff6b;
    --green-dim:#5fa36e;
    --amber:#ffb000;
    --red:#ff4433;
    --cyan:#4dd9ff;
    --text:#d7ffe0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, rgba(57,255,107,0.025) 0px, rgba(57,255,107,0.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at 50% -10%, rgba(57,255,107,0.09), transparent 55%),
      var(--void);
    color:var(--text);
    font-family:'Share Tech Mono', monospace;
    min-height:100vh;
    padding-bottom:max(60px, env(safe-area-inset-bottom));
  }
  .wrap{
    max-width:740px; margin:0 auto;
    padding:max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
  }

  .hud{position:relative; background:var(--panel); border:1px solid var(--grid); border-radius:2px;}
  .hud::before, .hud::after{
    content:""; position:absolute; width:14px; height:14px; border:2px solid var(--green); opacity:0.65;
  }
  .hud::before{top:-1px; left:-1px; border-right:none; border-bottom:none;}
  .hud::after{bottom:-1px; right:-1px; border-left:none; border-top:none;}

  header{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:20px;}
  h1{
    font-family:'VT323', monospace; font-weight:400; font-size:34px; letter-spacing:2px; margin:0;
    color:var(--green); text-shadow:0 0 8px rgba(57,255,107,0.45);
  }
  .tagline{font-size:12px; color:var(--green-dim); letter-spacing:1px; margin-top:0px;}
  .cursor{display:inline-block; width:8px; height:13px; background:var(--green); margin-left:2px; vertical-align:-2px; animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .add-btn{
    background:transparent; color:var(--green); border:1px solid var(--green); padding:10px 14px;
    font-family:'Share Tech Mono'; font-weight:700; font-size:13px; cursor:pointer; letter-spacing:1px;
    white-space:nowrap; border-radius:2px;
  }
  .add-btn:hover{background:rgba(57,255,107,0.1); box-shadow:0 0 10px rgba(57,255,107,0.25);}
  .add-btn:active{transform:translateY(1px);}

  .section-label{
    font-family:'Share Tech Mono', monospace; font-size:11px; letter-spacing:3px;
    text-transform:uppercase; color:var(--amber); margin:32px 0 12px; display:flex; align-items:center; gap:10px;
  }
  .section-label::before{content:"//"; color:var(--green-dim);}
  .section-label::after{content:""; flex:1; height:1px; background:var(--grid);}

  .board{padding:2px;}
  .row{display:flex; align-items:center; gap:14px; padding:13px 16px; border-bottom:1px solid var(--grid);}
  .row:last-child{border-bottom:none;}
  .rank{font-family:'VT323', monospace; font-size:22px; color:var(--green-dim); width:28px; text-align:center; flex-shrink:0;}
  .row.first{background:linear-gradient(90deg, rgba(255,176,0,0.08), transparent);}
  .row.first .rank{color:var(--amber);}
  .avatar{
    width:32px; height:32px; border:1px solid var(--green-dim); display:flex; align-items:center;
    justify-content:center; font-family:'Share Tech Mono'; font-weight:700; font-size:12px; color:var(--green);
    flex-shrink:0; border-radius:2px;
  }
  .row.first .avatar{border-color:var(--amber); color:var(--amber);}
  .pname{font-weight:700; font-size:14.5px; flex:1; min-width:0; letter-spacing:0.5px;}
  .pmeta{font-size:11px; color:var(--green-dim);}
  .ptotal{font-family:'VT323',serif; font-weight:400; font-size:24px; text-align:right; color:var(--green);}
  .row.first .ptotal{color:var(--amber); text-shadow:0 0 8px rgba(255,176,0,0.4);}
  .empty{text-align:center; padding:34px 20px; color:var(--green-dim); font-size:13px; line-height:1.7;}
  .empty b{color:var(--green);}

  .chart-wrap{padding:16px;}
  .range-toggle{display:flex; gap:6px; margin-bottom:14px;}
  .range-btn{
    flex:1; text-align:center; padding:7px; border:1px solid var(--grid); color:var(--green-dim);
    font-size:11.5px; letter-spacing:1px; cursor:pointer; border-radius:2px; background:transparent;
  }
  .range-btn.active{border-color:var(--green); color:var(--green); box-shadow:inset 0 0 8px rgba(57,255,107,0.15);}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--grid);}
  .legend-item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text);}
  .legend-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}

  .day-group{margin-bottom:16px;}
  .day-heading{font-size:11.5px; color:var(--green-dim); margin-bottom:8px; padding-left:2px; letter-spacing:1px;}
  .entry{padding:11px 14px; display:flex; align-items:center; gap:12px; margin-bottom:7px;}
  .entry .avatar{width:26px; height:26px; font-size:10.5px;}
  .entry-name{font-weight:700; font-size:13px; width:78px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .rounds{font-size:11.5px; color:var(--green-dim); flex:1; letter-spacing:0.5px;}
  .stamp{
    font-family:'VT323',monospace; font-weight:400; font-size:19px; color:var(--green);
    border:1px solid var(--green); border-radius:2px; padding:2px 9px; flex-shrink:0; letter-spacing:0.5px;
  }
  .del-btn{background:none; border:none; color:var(--green-dim); cursor:pointer; font-size:15px; padding:2px 4px; flex-shrink:0;}
  .del-btn:hover{color:var(--red);}

  .overlay{position:fixed; inset:0; background:rgba(3,5,4,0.82); display:none; align-items:flex-end; justify-content:center; z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--panel); border:1px solid var(--green); border-radius:2px 2px 0 0; width:100%; max-width:740px; padding:22px 20px 28px; max-height:88vh; overflow-y:auto;}
  @media(min-width:760px){ .overlay{align-items:center;} .modal{border-radius:2px; max-width:460px;} }
  .modal h2{font-family:'VT323',monospace; font-size:26px; margin:0 0 4px; color:var(--green); letter-spacing:1px;}
  .modal .sub{font-size:12px; color:var(--green-dim); margin-bottom:18px;}
  .tabs{display:flex; gap:6px; margin-bottom:18px;}
  .tab{flex:1; text-align:center; padding:9px; border:1px solid var(--grid); font-size:12px; letter-spacing:1px; cursor:pointer; color:var(--green-dim); border-radius:2px;}
  .tab.active{border-color:var(--green); color:var(--green);}
  label{display:block; font-size:11px; color:var(--green-dim); margin:14px 0 6px; letter-spacing:1px;}
  textarea, input, select{
    width:100%; background:var(--void); border:1px solid var(--grid); color:var(--text); border-radius:2px;
    padding:11px 12px; font-size:13.5px; font-family:'Share Tech Mono'; outline:none;
  }
  textarea{min-height:90px; font-size:12.5px; resize:vertical;}
  textarea:focus, input:focus, select:focus{border-color:var(--green);}
  .round-inputs{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  .round-inputs input{padding:9px 4px; text-align:center;}
  .newplayer-row{display:flex; gap:8px;}
  .newplayer-row input{flex:1;}
  .newplayer-row button{background:transparent; border:1px solid var(--green-dim); color:var(--green); border-radius:2px; padding:0 14px; cursor:pointer; font-size:12px;}
  .parsed-preview{margin-top:12px; background:var(--void); border:1px dashed var(--grid); border-radius:2px; padding:10px 12px; font-size:12px; color:var(--green); display:none;}
  .parsed-preview.show{display:block;}
  .err{color:var(--red); font-size:12px; margin-top:8px; display:none;}
  .err.show{display:block;}
  .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .btn-secondary{flex:1; background:none; border:1px solid var(--grid); color:var(--green-dim); padding:12px; border-radius:2px; font-weight:700; cursor:pointer; font-size:13px; letter-spacing:1px;}
  .btn-primary{flex:2; background:var(--green); border:none; color:var(--void); padding:12px; border-radius:2px; font-weight:700; cursor:pointer; font-size:13px; letter-spacing:1px;}
  .btn-primary:hover{box-shadow:0 0 12px rgba(57,255,107,0.4);}
  .loading{text-align:center; padding:40px; color:var(--green-dim); font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>MapTap Ledger<span class="cursor"></span></h1>
      <div class="tagline" id="dateline">Loading…</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add score</button>
  </header>

  <div class="section-label">Leaderboard</div>
  <div class="board hud" id="board"><div class="loading">Loading scores...</div></div>

  <div class="section-label">Trend</div>
  <div class="chart-wrap hud" id="chartPanel"><div class="loading">Loading trend...</div></div>

  <div class="section-label">History</div>
  <div id="log"><div class="loading">Loading history...</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal hud">
    <h2>Add today's score</h2>
    <div class="sub">Paste the group text, or enter it by hand.</div>
    <div class="tabs">
      <div class="tab active" id="tab-paste" onclick="switchTab('paste')">Paste text</div>
      <div class="tab" id="tab-manual" onclick="switchTab('manual')">Manual entry</div>
    </div>

    <div id="pane-paste">
      <label>Group text</label>
      <textarea id="pasteBox" placeholder="www.maptap.gg July 11&#10;89👑 98🔥 87🎉 82🌟 78🌞&#10;Final score: 841" oninput="parsePaste()"></textarea>
      <div class="parsed-preview" id="preview"></div>
    </div>

    <div id="pane-manual" style="display:none;">
      <label>Date</label>
      <input type="date" id="manualDate">
      <label>Round scores (optional)</label>
      <div class="round-inputs">
        <input type="number" id="r1" placeholder="R1">
        <input type="number" id="r2" placeholder="R2">
        <input type="number" id="r3" placeholder="R3">
        <input type="number" id="r4" placeholder="R4">
        <input type="number" id="r5" placeholder="R5">
      </div>
      <label>Final score</label>
      <input type="number" id="manualFinal" placeholder="841">
    </div>

    <label>Who's this for?</label>
    <select id="playerSelect"></select>
    <div class="newplayer-row" style="margin-top:8px;">
      <input type="text" id="newPlayerName" placeholder="Add a new player…" onkeydown="if(event.key==='Enter'){event.preventDefault(); addPlayer();}">
      <button onclick="addPlayer()">Add</button>
    </div>

    <div class="err" id="formErr"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEntry()">Save score</button>
    </div>
  </div>
</div>

<script>
let players = [];
let entries = [];
let activeTab = 'paste';
let parsedPaste = null;
let chartRange = 'month';
const COLORS = ['#39ff6b','#ffb000','#4dd9ff','#ff4433','#b366ff','#d7ffe0'];

const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function todayISO(){ return new Date().toISOString().slice(0,10); }
function initials(name){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function colorFor(playerId){ const i = players.findIndex(p=>p.id===playerId); return COLORS[i % COLORS.length]; }

async function loadData(){
  try{
    const r = await window.storage.get('ledger', true);
    if(r && r.value){
      const parsed = JSON.parse(r.value);
      players = parsed.players || [];
      entries = parsed.entries || [];
    }
  }catch(e){ players = []; entries = []; }
  render();
}

async function persist(){
  const attempt = async () => {
    const r = await window.storage.set('ledger', JSON.stringify({players, entries}), true);
    if(!r) throw new Error('Storage write returned no result');
  };
  try{ await attempt(); return true; }
  catch(err){
    console.error('Storage save failed, retrying once:', err);
    try{ await new Promise(res=>setTimeout(res, 400)); await attempt(); return true; }
    catch(err2){ console.error('Storage save failed on retry (data kept locally):', err2); return false; }
  }
}

function render(){
  document.getElementById('dateline').textContent = new Date().toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'});
  renderBoard();
  renderChart();
  renderLog();
  renderPlayerSelect();
}

function renderBoard(){
  const board = document.getElementById('board');
  if(players.length === 0){
    board.innerHTML = `<div class="empty"><b>No players yet.</b><br>Tap "+ Add score" to add your first friend and log a day.</div>`;
    return;
  }
  const totals = players.map(pl=>{
    const pe = entries.filter(e=>e.playerId===pl.id);
    const total = pe.reduce((s,e)=>s+e.final,0);
    return {player:pl, total, games:pe.length};
  }).sort((a,b)=>b.total-a.total);

  board.innerHTML = totals.map((t,i)=>`
    <div class="row ${i===0 && t.total>0 ? 'first':''}">
      <div class="rank">${String(i+1).padStart(2,'0')}</div>
      <div class="avatar" style="${i===0 && t.total>0 ? '' : 'border-color:'+colorFor(t.player.id)+';color:'+colorFor(t.player.id)}">${initials(t.player.name)}</div>
      <div>
        <div class="pname">${escapeHtml(t.player.name)}</div>
        <div class="pmeta">${t.games} day${t.games===1?'':'s'} logged${t.games ? ' · avg ' + Math.round(t.total/t.games).toLocaleString() : ''}</div>
      </div>
      <div class="ptotal">${t.total.toLocaleString()}</div>
    </div>
  `).join('');
}

function computeSeries(){
  const allDates = [...new Set(entries.map(e=>e.date))].sort();
  const series = {};
  const running = {};
  players.forEach(p=>{ series[p.id] = []; running[p.id] = 0; });
  allDates.forEach(date=>{
    entries.filter(e=>e.date===date).forEach(e=>{
      if(running[e.playerId]===undefined) running[e.playerId]=0;
      running[e.playerId]+=e.final;
    });
    players.forEach(p=> series[p.id].push({date, cum: running[p.id]}) );
  });
  return {allDates, series};
}

function filterDates(allDates, range){
  if(range==='all' || allDates.length===0) return allDates;
  const days = range==='week' ? 7 : 30;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days + 1);
  const cutoffISO = cutoff.toISOString().slice(0,10);
  const filtered = allDates.filter(d=>d>=cutoffISO);
  return filtered.length ? filtered : allDates.slice(-1);
}

function renderChart(){
  const panel = document.getElementById('chartPanel');
  if(players.length===0 || entries.length===0){
    panel.innerHTML = `<div class="empty">No data to plot yet. Log a few days to see trends.</div>`;
    return;
  }
  const {allDates, series} = computeSeries();
  const visDates = filterDates(allDates, chartRange);
  const startIdx = allDates.indexOf(visDates[0]);

  let maxY = 1;
  players.forEach(p=>{
    visDates.forEach((d,idx)=>{
      const pt = series[p.id][startIdx+idx];
      if(pt && pt.cum > maxY) maxY = pt.cum;
    });
  });

  const W = 680, H = 220, padL = 36, padR = 10, padT = 14, padB = 22;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const xStep = visDates.length > 1 ? plotW/(visDates.length-1) : 0;

  const gridLines = [0,0.25,0.5,0.75,1].map(f=>{
    const y = padT + plotH - f*plotH;
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#1b2e1d" stroke-width="1"/>
            <text x="4" y="${y+3}" font-size="9" fill="#5fa36e" font-family="Share Tech Mono">${Math.round(f*maxY)}</text>`;
  }).join('');

  const lines = players.map(p=>{
    const pts = visDates.map((d,idx)=>{
      const pt = series[p.id][startIdx+idx];
      const val = pt ? pt.cum : 0;
      const x = padL + idx*xStep;
      const y = padT + plotH - (val/maxY)*plotH;
      return `${x},${y}`;
    }).join(' ');
    const lastPt = pts.split(' ').pop();
    return `<polyline points="${pts}" fill="none" stroke="${colorFor(p.id)}" stroke-width="2"/>
            <circle cx="${lastPt.split(',')[0]}" cy="${lastPt.split(',')[1]}" r="3" fill="${colorFor(p.id)}"/>`;
  }).join('');

  const xLabels = [0, Math.floor((visDates.length-1)/2), visDates.length-1]
    .filter((v,i,arr)=>arr.indexOf(v)===i)
    .map(idx=>{
      const x = padL + idx*xStep;
      const [y,m,d] = visDates[idx].split('-');
      return `<text x="${x}" y="${H-4}" font-size="9" fill="#5fa36e" font-family="Share Tech Mono" text-anchor="middle">${m}/${d}</text>`;
    }).join('');

  const legend = players.map(p=>{
    const total = entries.filter(e=>e.playerId===p.id).reduce((s,e)=>s+e.final,0);
    return `<div class="legend-item"><span class="legend-dot" style="background:${colorFor(p.id)}"></span>${escapeHtml(p.name)} · ${total.toLocaleString()}</div>`;
  }).join('');

  panel.innerHTML = `
    <div class="range-toggle">
      <div class="range-btn ${chartRange==='week'?'active':''}" onclick="setRange('week')">7 days</div>
      <div class="range-btn ${chartRange==='month'?'active':''}" onclick="setRange('month')">30 days</div>
      <div class="range-btn ${chartRange==='all'?'active':''}" onclick="setRange('all')">All time</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;">
      ${gridLines}
      ${lines}
      ${xLabels}
    </svg>
    <div class="legend">${legend}</div>
  `;
}

function setRange(r){ chartRange = r; renderChart(); }

function renderLog(){
  const log = document.getElementById('log');
  if(entries.length === 0){
    log.innerHTML = `<div class="board hud"><div class="empty">Nothing logged yet. Your first entry will show up here.</div></div>`;
    return;
  }
  const byDate = {};
  entries.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt)
    .forEach(e=>{ (byDate[e.date] = byDate[e.date]||[]).push(e); });

  log.innerHTML = Object.keys(byDate).sort().reverse().map(date=>{
    const rows = byDate[date].map(e=>{
      const pl = players.find(p=>p.id===e.playerId);
      const name = pl ? pl.name : 'Unknown';
      const roundsStr = (e.rounds && e.rounds.some(r=>r!==null && r!=='')) ? e.rounds.map(r=> r===null||r==='' ? '–' : r).join('  ·  ') : '';
      return `
        <div class="entry hud">
          <div class="avatar" style="border-color:${colorFor(e.playerId)};color:${colorFor(e.playerId)}">${initials(name)}</div>
          <div class="entry-name">${escapeHtml(name)}</div>
          <div class="rounds">${roundsStr}</div>
          <div class="stamp">${e.final}</div>
          <button class="del-btn" onclick="deleteEntry('${e.id}')">✕</button>
        </div>`;
    }).join('');
    return `<div class="day-group"><div class="day-heading">${formatDate(date)}</div>${rows}</div>`;
  }).join('');
}

function formatDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'});
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderPlayerSelect(){
  const sel = document.getElementById('playerSelect');
  sel.innerHTML = players.length
    ? players.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')
    : `<option value="">— add a player below —</option>`;
}

function openModal(){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('manualDate').value = todayISO();
  document.getElementById('formErr').classList.remove('show');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('pasteBox').value = '';
  document.getElementById('preview').classList.remove('show');
  parsedPaste = null;
  ['r1','r2','r3','r4','r5','manualFinal'].forEach(id=>document.getElementById(id).value='');
}

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-paste').classList.toggle('active', tab==='paste');
  document.getElementById('tab-manual').classList.toggle('active', tab==='manual');
  document.getElementById('pane-paste').style.display = tab==='paste' ? 'block':'none';
  document.getElementById('pane-manual').style.display = tab==='manual' ? 'block':'none';
}

async function addPlayer(){
  const input = document.getElementById('newPlayerName');
  const errEl = document.getElementById('formErr');
  errEl.classList.remove('show');
  const name = input.value.trim();
  if(!name) return;
  if(players.some(p=>p.name.toLowerCase() === name.toLowerCase())){
    errEl.textContent = `"${name}" is already on the list.`;
    errEl.classList.add('show');
    return;
  }
  const id = 'p_' + Date.now() + Math.random().toString(36).slice(2,6);
  players.push({id, name});
  input.value = '';
  renderPlayerSelect();
  document.getElementById('playerSelect').value = id;
  renderBoard();
  await persist();
}

function parsePaste(){
  const text = document.getElementById('pasteBox').value;
  const preview = document.getElementById('preview');
  if(!text.trim()){ preview.classList.remove('show'); parsedPaste = null; return; }

  let date = todayISO();
  const dateMatch = text.match(/([A-Za-z]{3,9})\s+(\d{1,2})/);
  if(dateMatch){
    const mon = MONTHS[dateMatch[1].slice(0,3).toLowerCase()];
    if(mon !== undefined){
      const year = new Date().getFullYear();
      const day = parseInt(dateMatch[2]);
      date = `${year}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }

  const roundMatches = [...text.matchAll(/(\d+)\s*[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/gu)].map(m=>parseInt(m[1]));
  const finalMatch = text.match(/final\s*score[:\s]*([\d,]+)/i);
  const final = finalMatch ? parseInt(finalMatch[1].replace(/,/g,'')) : null;

  if(final === null){
    preview.classList.add('show');
    preview.textContent = "Couldn't find a final score — check the pasted text or use manual entry.";
    parsedPaste = null;
    return;
  }

  parsedPaste = { date, rounds: roundMatches.slice(0,5), final };
  preview.classList.add('show');
  preview.innerHTML = `${formatDate(date)} · rounds: ${parsedPaste.rounds.join(', ') || '—'} · final: <b>${final}</b>`;
}

async function saveEntry(){
  const errEl = document.getElementById('formErr');
  errEl.classList.remove('show');
  const playerId = document.getElementById('playerSelect').value;
  if(!playerId){ errEl.textContent = 'Pick or add a player first.'; errEl.classList.add('show'); return; }

  let date, rounds, final;
  if(activeTab === 'paste'){
    if(!parsedPaste){ errEl.textContent = "Paste a valid text with a final score, or switch to manual entry."; errEl.classList.add('show'); return; }
    ({date, rounds, final} = parsedPaste);
  }else{
    date = document.getElementById('manualDate').value || todayISO();
    rounds = ['r1','r2','r3','r4','r5'].map(id=>{
      const v = document.getElementById(id).value;
      return v === '' ? null : parseInt(v);
    });
    final = parseInt(document.getElementById('manualFinal').value);
    if(isNaN(final)){ errEl.textContent = 'Enter a final score.'; errEl.classList.add('show'); return; }
  }

  entries.push({
    id: 'e_' + Date.now() + Math.random().toString(36).slice(2,6),
    date, playerId, rounds: rounds || [], final, createdAt: Date.now()
  });
  render();
  closeModal();
  await persist();
}

async function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  render();
  await persist();
}

loadData();
</script>
